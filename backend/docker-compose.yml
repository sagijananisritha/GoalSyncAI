version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: goalsync-postgres
    environment:
      POSTGRES_USER: goalsync
      POSTGRES_PASSWORD: goalsync_password
      POSTGRES_DB: goalsync_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
